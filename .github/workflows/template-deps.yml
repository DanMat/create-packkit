name: Template dependency freshness
on:
  schedule:
    - cron: '0 9 * * 1' # Mondays
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/core/features/**'
      - 'src/core/monorepo.js'
      - 'scripts/check-template-deps.mjs'

permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
      - run: npm ci

      - name: Check template dependencies
        id: check
        run: |
          node scripts/check-template-deps.mjs | tee report.md
          echo "stale=${PIPESTATUS[0]}" >> "$GITHUB_OUTPUT"
        continue-on-error: true

      - name: Open or update an issue when stale
        if: steps.check.outputs.stale != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE="Stale template dependencies"
          {
            echo "_Auto-generated by the template-deps workflow. These are versions Packkit writes into generated projects — bump them in \`src/core/features/*\` (and \`src/core/monorepo.js\`), then verify the affected presets still build._"
            echo
            cat report.md
          } > issue.md
          NUM=$(gh issue list --state open --search "in:title $TITLE" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$NUM" ]; then
            gh issue edit "$NUM" --body-file issue.md
          else
            gh issue create --title "$TITLE" --body-file issue.md --label dependencies 2>/dev/null \
              || gh issue create --title "$TITLE" --body-file issue.md
          fi

      - name: Close the issue when everything is fresh
        if: steps.check.outputs.stale == '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NUM=$(gh issue list --state open --search "in:title Stale template dependencies" --json number --jq '.[0].number' 2>/dev/null)
          if [ -n "$NUM" ]; then
            gh issue close "$NUM" --comment "All bumpable template dependencies are current — closing automatically."
          fi
