name: Integration (generated projects)
# Generates each preset, installs it, and runs its own checks (build/test/…),
# so a change to generation logic or a template dependency version can't
# silently break the projects Packkit produces.
on:
  push:
    branches: [main]
    paths:
      - 'src/core/**'
      - 'bin/**'
      - 'scripts/integration.mjs'
  pull_request:
    paths:
      - 'src/core/**'
      - 'bin/**'
      - 'scripts/integration.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - ts-lib
          - js-lib
          - cli
          - react-lib
          - react-app
          - vue-lib
          - vue-app
          - svelte-lib
          - svelte-app
          - node-service
          - monorepo
          - oss
          - full
          - minimal
          - react-lib --storybook
          - ts-lib --lint biome
          - ts-lib --lint oxlint
          - ts-lib --test jest
          - ts-lib --bundler rollup
          - ts-lib --bundler unbuild
          - cli --hooks lefthook
    name: ${{ matrix.preset }}
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      # Pin to the exact minimum Node we advertise (engines floor), NOT '20'
      # (which floats to the latest 20.x and hides sub-floor breakage — this is
      # what let a Node-20.17 failure ship). Generated projects claim >=20.19.0.
      - uses: actions/setup-node@v4
        with:
          node-version: '20.19.0'
          cache: npm
      - run: npm ci
      - run: node scripts/integration.mjs ${{ matrix.preset }}
