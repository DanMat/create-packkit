name: Integration (generated projects)
# Generates each preset, installs it, and runs its own checks (build/test/…),
# so a change to generation logic or a template dependency version can't
# silently break the projects Packkit produces.
on:
  push:
    branches: [main]
    paths:
      - 'src/core/**'
      - 'bin/**'
      - 'scripts/integration.mjs'
  pull_request:
    paths:
      - 'src/core/**'
      - 'bin/**'
      - 'scripts/integration.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  generate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        preset:
          - ts-lib
          - js-lib
          - cli
          - react-lib
          - react-app
          - vue-lib
          - vue-app
          - svelte-lib
          - svelte-app
          - node-service
          - monorepo
          - oss
          - full
          - minimal
          - react-lib --storybook
          - ts-lib --lint biome
          - ts-lib --lint oxlint
          - ts-lib --test jest
          - ts-lib --bundler rollup
          - ts-lib --bundler unbuild
          - cli --hooks lefthook
          - react-app --e2e
    name: ${{ matrix.preset }}
    steps:
      - uses: actions/checkout@v4
      # Test at the EXACT engines floor of the default generated project (not a
      # floated major, which hides sub-floor breakage — that's what let a Node
      # 20.17 failure ship). Derived from DEFAULT_NODE so it tracks upstream LTS
      # automatically. Runs on the runner's pre-installed Node.
      - id: floor
        run: |
          V=$(node --input-type=module -e "import('./src/core/node.js').then(m=>process.stdout.write(m.engineFloor(m.DEFAULT_NODE)))")
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "Testing generated projects at Node $V (default engines floor)"
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.floor.outputs.version }}
          cache: npm
      - run: npm ci
      - run: node scripts/integration.mjs ${{ matrix.preset }}
