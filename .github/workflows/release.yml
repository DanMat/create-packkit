name: Release
on:
  workflow_dispatch:
    inputs:
      bump:
        description: Version bump
        type: choice
        options: [patch, minor, major]
        default: patch

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v7
        with:
          node-version: '24'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
      - run: npm ci
      - run: npm test

      # keep the web bundle in sync before publishing
      - run: npm run build:web

      - name: Bump version
        id: bump
        run: |
          npm version ${{ inputs.bump }} --no-git-tag-version
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      # packkit-mcp depends on create-packkit via a caret (^X.y.z), so it already
      # picks up every new minor/patch at install time. It only needs re-pinning
      # (and republishing) when the MAJOR changes — otherwise the MCP server would
      # keep scaffolding with the previous major. Do that automatically here.
      - name: Keep packkit-mcp linked to the current create-packkit major
        run: |
          NEW_MAJOR=$(node -p "require('./package.json').version.split('.')[0]")
          CUR_MAJOR=$(node -p "(require('./mcp/package.json').dependencies['create-packkit']||'').replace(/[^0-9.]/g,'').split('.')[0]")
          if [ "$NEW_MAJOR" != "$CUR_MAJOR" ]; then
            echo "create-packkit major $CUR_MAJOR -> $NEW_MAJOR — re-pinning and bumping packkit-mcp"
            npm --prefix mcp pkg set "dependencies.create-packkit=^${NEW_MAJOR}.0.0"
            npm --prefix mcp version patch --no-git-tag-version
          else
            echo "create-packkit major unchanged ($CUR_MAJOR); packkit-mcp's caret already tracks the new release."
          fi

      - name: Commit and tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "release v${{ steps.bump.outputs.version }}"
          git tag -a "v${{ steps.bump.outputs.version }}" -m "v${{ steps.bump.outputs.version }}"
          git push --follow-tags

      - name: Publish create-packkit
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish packkit-mcp (only when its version is new)
        working-directory: mcp
        run: |
          V=$(node -p "require('./package.json').version")
          if [ "$(npm view packkit-mcp@$V version 2>/dev/null)" = "$V" ]; then
            echo "packkit-mcp@$V already published — skipping"
          else
            npm publish --provenance --access public
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: GitHub Release
        run: gh release create "v${{ steps.bump.outputs.version }}" --generate-notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
